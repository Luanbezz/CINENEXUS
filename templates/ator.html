<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ ator.nome }} | Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-sans">
    <div class="max-w-6xl mx-auto py-20 px-6">
        <a href="javascript:history.back()" class="text-gray-500 hover:text-white mb-8 inline-block font-bold tracking-widest text-xs uppercase">← Voltar</a>

        <div class="flex flex-col md:flex-row gap-16 items-start">
            <img src="{{ ator.foto }}" class="w-80 rounded-3xl shadow-2xl border border-white/10">
            
            <div class="flex-1">
                <h1 class="text-7xl font-black mb-6 tracking-tighter">{{ ator.nome }}</h1>
                <p class="text-gray-400 text-2xl leading-relaxed mb-12">{{ ator.bio }}</p>

                <h3 class="text-xl font-bold mb-8 border-b border-red-600 pb-2 inline-block uppercase tracking-widest text-gray-300">Filmografia</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {% for fid, f in filmes.items() %}
                    <a href="/filme/{{ fid }}" class="bg-zinc-900/50 p-4 rounded-2xl flex items-center gap-4 hover:bg-white/5 transition border border-white/5">
                        <img src="{{ f.imagem }}" class="w-12 h-18 rounded object-cover shadow-lg">
                        <div>
                            <p class="font-bold text-white">{{ f.titulo }}</p>
                            <p class="text-xs text-gray-500">{{ f.ano }} • ⭐ {{ f.nota }}</p>
                        </div>
                    </a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
